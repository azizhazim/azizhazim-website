<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Aziz Hazim Analytics</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f8fb;
            --surface: #ffffff;
            --ink: #111318;
            --muted: #596171;
            --line: #dbe3ef;
            --blue: #0f6fff;
            --green: #15a37d;
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(1180px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 2rem 0 3rem;
        }

        header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        h1,
        h2,
        p {
            margin: 0;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.4rem);
            line-height: 0.95;
            letter-spacing: -0.05em;
        }

        h2 {
            font-size: 1rem;
        }

        .muted {
            color: var(--muted);
        }

        .controls,
        .panel,
        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 0.75rem;
            padding: 0.75rem;
            margin-bottom: 1rem;
        }

        input,
        select,
        button {
            min-height: 44px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            font: inherit;
        }

        input,
        select {
            width: 100%;
            padding: 0.75rem;
            background: #fff;
        }

        button {
            padding: 0 1rem;
            background: var(--blue);
            color: #fff;
            cursor: pointer;
            font-weight: 800;
        }

        .status {
            margin-bottom: 1rem;
            color: var(--muted);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .card {
            padding: 1rem;
        }

        .card strong {
            display: block;
            font-size: 2rem;
            line-height: 1;
            letter-spacing: -0.04em;
        }

        .card span {
            display: block;
            margin-top: 0.45rem;
            color: var(--muted);
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .panel {
            overflow: hidden;
        }

        .panel h2 {
            padding: 1rem;
            border-bottom: 1px solid var(--line);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
            font-size: 0.92rem;
        }

        th {
            color: var(--muted);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .bar {
            width: 100%;
            height: 8px;
            background: #eaf0f8;
            border-radius: 999px;
            overflow: hidden;
        }

        .bar span {
            display: block;
            height: 100%;
            background: var(--green);
        }

        .wide {
            grid-column: 1 / -1;
        }

        @media (max-width: 820px) {
            header,
            .controls {
                grid-template-columns: 1fr;
                align-items: stretch;
            }

            .cards,
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <div>
                <p class="muted">Private dashboard</p>
                <h1>Site Analytics</h1>
            </div>
            <a href="/" class="muted">Back to site</a>
        </header>

        <form class="controls" id="controls">
            <input id="token" name="token" type="password" autocomplete="current-password" placeholder="Analytics admin token">
            <select id="days" name="days" aria-label="Date range">
                <option value="7">Last 7 days</option>
                <option value="30" selected>Last 30 days</option>
                <option value="90">Last 90 days</option>
                <option value="180">Last 180 days</option>
            </select>
            <button type="submit">Load analytics</button>
        </form>

        <p class="status" id="status">Enter the token stored in Netlify as ANALYTICS_ADMIN_TOKEN.</p>

        <section class="cards" id="totals" aria-label="Analytics totals"></section>
        <section class="grid" id="tables"></section>
    </main>

    <script>
        const controls = document.querySelector("#controls");
        const tokenInput = document.querySelector("#token");
        const daysInput = document.querySelector("#days");
        const statusEl = document.querySelector("#status");
        const totalsEl = document.querySelector("#totals");
        const tablesEl = document.querySelector("#tables");

        tokenInput.value = sessionStorage.getItem("azizhazim.analytics.token") || "";

        function formatNumber(value) {
            return new Intl.NumberFormat().format(value || 0);
        }

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;",
            }[char]));
        }

        function renderTotals(totals) {
            const cards = [
                ["Page views", totals.pageViews],
                ["Visitors", totals.uniqueVisitors],
                ["Sessions", totals.sessions],
                ["Outbound clicks", totals.outboundClicks],
            ];

            totalsEl.innerHTML = cards.map(([label, value]) => `
                <article class="card">
                    <strong>${formatNumber(value)}</strong>
                    <span>${label}</span>
                </article>
            `).join("");
        }

        function renderTable(title, rows) {
            const max = Math.max(...rows.map((row) => row.value), 1);
            return `
                <article class="panel">
                    <h2>${escapeHtml(title)}</h2>
                    <table>
                        <thead>
                            <tr><th>Item</th><th>Count</th><th>Share</th></tr>
                        </thead>
                        <tbody>
                            ${rows.length ? rows.map((row) => `
                                <tr>
                                    <td>${escapeHtml(row.label)}</td>
                                    <td>${formatNumber(row.value)}</td>
                                    <td><div class="bar"><span style="width:${Math.max(4, Math.round((row.value / max) * 100))}%"></span></div></td>
                                </tr>
                            `).join("") : `<tr><td colspan="3" class="muted">No data yet.</td></tr>`}
                        </tbody>
                    </table>
                </article>
            `;
        }

        function renderRecent(rows) {
            return `
                <article class="panel wide">
                    <h2>Recent Events</h2>
                    <table>
                        <thead>
                            <tr><th>Time</th><th>Event</th><th>Page / Target</th><th>Visitor context</th></tr>
                        </thead>
                        <tbody>
                            ${rows.length ? rows.map((row) => `
                                <tr>
                                    <td>${escapeHtml(new Date(row.ts).toLocaleString())}</td>
                                    <td>${escapeHtml(row.event)}</td>
                                    <td>${escapeHtml(row.targetUrl || row.page || "")}</td>
                                    <td>${escapeHtml([row.city, row.country, row.device, row.browser, row.os].filter(Boolean).join(" / "))}</td>
                                </tr>
                            `).join("") : `<tr><td colspan="4" class="muted">No recent events yet.</td></tr>`}
                        </tbody>
                    </table>
                </article>
            `;
        }

        function render(data) {
            renderTotals(data.totals);

            const tables = data.tables;
            tablesEl.innerHTML = [
                renderTable("Top Pages", tables.pages),
                renderTable("Referrers", tables.referrers),
                renderTable("Countries", tables.countries),
                renderTable("Cities", tables.cities),
                renderTable("Devices", tables.devices),
                renderTable("Browsers", tables.browsers),
                renderTable("Operating Systems", tables.operatingSystems),
                renderTable("Screen Sizes", tables.screenSizes),
                renderTable("UTM Sources", tables.utmSources),
                renderTable("Outbound Clicks", tables.outboundClicks),
                renderRecent(data.recent),
            ].join("");

            statusEl.textContent = `Showing ${data.range.from} to ${data.range.to}. ${data.privacy}`;
        }

        async function loadAnalytics(event) {
            event.preventDefault();
            const token = tokenInput.value.trim();
            const days = daysInput.value;
            if (!token) {
                statusEl.textContent = "Enter your analytics token first.";
                return;
            }

            sessionStorage.setItem("azizhazim.analytics.token", token);
            statusEl.textContent = "Loading analytics...";

            try {
                const response = await fetch(`/api/analytics/report?days=${encodeURIComponent(days)}`, {
                    headers: { "x-analytics-token": token },
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.setup || data.error || "Unable to load analytics.");
                }
                render(data);
            } catch (error) {
                totalsEl.innerHTML = "";
                tablesEl.innerHTML = "";
                statusEl.textContent = error.message;
            }
        }

        controls.addEventListener("submit", loadAnalytics);
    </script>
</body>
</html>
